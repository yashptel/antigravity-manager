services:
  antigravity-manager:
    image: lbjlaq/antigravity-manager:v4.2.2
    restart: unless-stopped
    env_file:
      - .env
    environment:
      API_KEY: ${API_KEY:?API_KEY is required}
      WEB_PASSWORD: ${WEB_PASSWORD:-}
      ABV_MAX_BODY_SIZE: ${ABV_MAX_BODY_SIZE:-104857600}
    volumes:
      # Named volume persists across Dokploy redeploys (Dokploy re-clones the
      # repo dir on every deploy, so relative ./ mounts get wiped).
      - antigravity-data:/root/.antigravity_tools # accounts, config, state
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # The minimal Rust image lacks wget/curl, and a failing healthcheck
    # causes Traefik to filter the container out -> 404.
    # Disable it so Traefik routes traffic unconditionally.
    healthcheck:
      disable: true
    networks:
      - dokploy-network
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      - traefik.http.routers.antigravity.rule=Host(`antigravity.debugblackbox.com`)
      - traefik.http.routers.antigravity.entrypoints=websecure
      - traefik.http.routers.antigravity.tls.certresolver=letsencrypt
      - traefik.http.services.antigravity.loadbalancer.server.port=8045
    # Traefik reaches the manager over dokploy-network — no host ports needed.
    # For direct local access (bypassing the domain), temporarily switch to
    # `ports:` and redeploy:
    #   ports:
    #     - "127.0.0.1:8045:8045"
    expose:
      - "8045"

volumes:
  antigravity-data:

networks:
  dokploy-network:
    external: true
